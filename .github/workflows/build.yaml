name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube-scan:
    name: SonarQube scan
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

 #     - name: SonarQube Quality Gate
 #       uses: sonarsource/sonarqube-quality-gate-action@v1
 #       timeout-minutes: 5
 #       env:
 #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  npm-setup-and-trivy-scan:
    name: npm-setup-and-trivy-scan
    runs-on: ubuntu-latest
    needs: sonarqube-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          skip-dirs: "node_modules,.git"

  docker-build-scan-push:
    name: docker build and trivy scan
    runs-on: ubuntu-latest
    needs: npm-setup-and-trivy-scan
    steps:
      - name: checkout 
        uses: actions/checkout@v4
      
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: thumama610/nodeapp:${{ github.sha }}
          push: false
          build-args: |
            REACT_APP_RAPID_API_KEY=${{ secrets.REACT_APP_RAPID_API_KEY }}
      
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: thumama610/nodeapp:${{ github.sha }}
          format: table
      #    exit-code: 1
      #    severity: CRITICAL,HIGH

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: thumama610/nodeapp:${{ github.sha }}
          push: true
          build-args: |
            REACT_APP_RAPID_API_KEY=${{ secrets.REACT_APP_RAPID_API_KEY }}

  modify-deployment-file-and-inject:
    name: modify-deployment-file-and-inject
    runs-on: ubuntu-latest
    needs: docker-build-scan-push
    steps:
      - name: checkout 
        uses: actions/checkout@v4

      - name: update deployment file
        run: |
          sed -i "s|image: .*|image: thumama610/nodeapp:${{ github.sha }}|g" Kubernetes/deployment.yml

      - name: inject k8s files into the server
        run: |
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > my-key.pem
          sudo chmod 700 my-key.pem
          ls
          scp -o StrictHostKeyChecking=no -i my-key.pem -r Kubernetes/ ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_IP_ADDRESS }}:~
      
  ssh-and-apply-changes:
    name: ssh-and-apply-changes
    runs-on: ubuntu-latest
    needs: modify-deployment-file-and-inject
    steps:
      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_IP_ADDRESS }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            kubectl delete --all pods
            kubectl apply -f Kubernetes/deployment.yml
            kubectl apply -f Kubernetes/service.yml


    


  